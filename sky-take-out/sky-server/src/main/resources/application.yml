server:
  port: 8080

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${sky.datasource.driver-class-name}
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}
      password: ${sky.datasource.password}
  redis:
    host: ${sky.redis.host}
    port: ${sky.redis.port}
    password: ${sky.redis.password}
    database: ${sky.redis.database}

    # Redisson 配置
    redisson:
      # 单机模式（最常用）
      address: redis://${spring.redis.host}:${spring.redis.port}
      password: ${spring.redis.password:}
      database: ${spring.redis.database:0}

      # 连接池配置
      threads: 4                    # 线程数量
      netty-threads: 8              # Netty 线程数量

      # 客户端配置
      connect-timeout: 10000        # 连接超时时间（毫秒）
      timeout: 3000                 # 命令等待超时时间（毫秒）

      # 重试策略
      retry-attempts: 3             # 失败重试次数
      retry-interval: 1500          # 重试间隔（毫秒）

      # 单节点配置（可选，更详细的配置）
      single-server-config:
        connection-minimum-idle-size: 5      # 最小空闲连接数
        connection-pool-size: 24             # 连接池大小
        idle-connection-timeout: 10000       # 空闲连接超时（毫秒）
        subscription-connection-minimum-idle-size: 1   # 订阅连接最小空闲数
        subscription-connection-pool-size: 25          # 订阅连接池大小

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  jwt:
    # 设置jwt签名加密时使用的密钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    admin-token-name: token
    # 设置前端传递过来的令牌名称
    user-secret-key: itheima
    user-ttl: 7200000
    user-token-name: authentication
  alioss:
    endpoint: ${sky.alioss.endpoint}
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    bucket-name: ${sky.alioss.bucket-name}
  wechat:
    appid: ${sky.wechat.appid}
    secret: ${sky.wechat.secret}
    mchid : ${sky.wechat.mchid}
    mchSerialNo: ${sky.wechat.mchSerialNo}
    privateKeyFilePath: ${sky.wechat.privateKeyFilePath}
    apiV3Key: ${sky.wechat.apiV3Key}
    weChatPayCertFilePath: ${sky.wechat.weChatPayCertFilePath}
    notifyUrl: ${sky.wechat.notifyUrl}
    refundNotifyUrl: ${sky.wechat.refundNotifyUrl}
  shop:
    address: 江苏省扬州市广陵区
  baidu:
    ak: w3UQFSErxY42R2LSjg6KbfgAxj6Ud9CJ
